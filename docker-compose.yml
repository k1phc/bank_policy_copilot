services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bank_policy_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank_policy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_policy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
